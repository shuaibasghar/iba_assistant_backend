# ═══════════════════════════════════════════════════════════════════
# IBA Sukkur University Portal - Task Definitions
# ═══════════════════════════════════════════════════════════════════
#
# Ambiguous requests: If you cannot tell what they want, do NOT guess or invent
# details. Ask ONE short, polite clarifying question in their language (English,
# Roman Urdu, or mixed), e.g.:
#   "Theek se bata dein, aap ko exactly kya chahiye?"
#   "Please tell me specifically what you need — for example course code, document
#   type, or whether you want a file/link vs status only."
# Then wait for a clear answer before acting.

route_query_task:
    description: >
        Analyze the student's query: "{query}"

        Student Info:
        - Name: {student_name}
        - Roll Number: {roll_number}
        - Semester: {semester}
        - Department: {department}

        Determine the intent and classify into one of these categories:
        1. ASSIGNMENT - assignments, submissions, due dates, homework, course PDFs/handouts,
           class materials, "PDF bhejo" / "link do" when they mean coursework (not transcripts)
        2. FEE - fees, payment, dues, challan
        3. EXAM - exam schedule, dates, venues, papers, hall ticket, admit card, roll number slip
        4. GRADE - results, marks, CGPA, GPA, academic performance
        5. DOCUMENT - transcripts, enrollment certificates, official document status, degree,
           "document" when they clearly mean registrar/records (not a class handout).
           **Not** teacher/faculty rosters, "all teachers", CSV/Excel lists of people, or directory
           exports — use GENERAL.
        6. ATTENDANCE - class attendance, shortage, percentage, 75% rule
        7. TIMETABLE - class schedule, time table, which class when, room
        8. LIBRARY - books issued, due date, fine, return
        9. SCHOLARSHIP - scholarship, financial aid, stipend, disbursement
        10. HOSTEL - hostel room, warden, hostel fee, accommodation
        11. COMPLAINT - complaint, ticket, support request, grievance
        12. ANNOUNCEMENT - campus notice, circular, news, urgent alert
        13. EMAIL - send an email, mail to, Gmail, forward this to my email
        14. GENERAL - greetings, small talk, or unclear intent

        Consider Roman Urdu patterns like:
        - "assignment pending hai" → ASSIGNMENT
        - "fees status batao" → FEE
        - "exam kab hai" / "admit card" → EXAM
        - "result batao" → GRADE
        - "transcript chahiye" / degree certificate / enrollment letter → DOCUMENT
        - "CS301 ka PDF" / handout / syllabus file / assignment material → ASSIGNMENT
        - "attendance kitni hai" → ATTENDANCE
        - "time table" → TIMETABLE
        - "email bhejo" / "mail karo" → EMAIL
    expected_output: >
        A JSON object with:
        - intent: The category (one of the 14 above, or GENERAL)
        - confidence: Confidence score 0-1
        - extracted_entities: Any specific entities (course name, semester, etc.)
        - response_hint: Brief hint for the specialist agent
    agent: router_agent

# Used when intent is already GENERAL — must read like a human chat, not JSON
general_conversation_task:
    description: >
        The student wrote: "{query}"

        Student: {student_name} | Roll: {roll_number} | Semester: {semester} | Dept: {department}

        Recent conversation context (if any):
        {conversation_history}

        Respond as a warm, helpful IBA Sukkur assistant.
        Greeting rules (very important — product policy):
        - Do NOT use "Wa alaikum assalam", "Walaikum assalam", "Walekum salam", or any
          Islamic salam/response phrase in your reply, even if the student greets
          with salam. Use neutral, inclusive wording only.
        - Preferred opens: "Hello {student_name}!", "Hi {student_name},", "Khush amdeed!", "Welcome
          back to the portal", "Good to see you" — then one line offering help
          (fees, assignments, exams, grades, documents, attendance, timetable,
          library, scholarships, hostel, complaints, announcements).
        - If they only greet (salam, hi, walekum salam, assalam, etc.), mirror warmth
          without religious phrases. Match English / Roman Urdu / mixed as they used.
        - Do NOT output JSON, YAML, bullet metadata, or "intent/confidence" fields.
        - Do NOT describe your internal analysis—only speak to the student.
        - If their request is unclear, invite them to ask about fees, assignments,
          exams, grades, documents, attendance, timetable, or other portal topics
          in one short paragraph.

        **CLARIFYING QUESTIONS - IF REQUEST IS UNCLEAR:**
        If you cannot tell what they want, ask ONE focused question before doing much else:
        Roman Urdu example: "Theek se bata dein, aap exactly kya chahte hain?"
        English: "Please tell me specifically what you need so I can help."
        Optionally add 1–2 examples (fees, assignment PDF, grades, transcript status, etc.).
        If they are vague but somewhat on-topic, still ask what *specific* thing they mean
        (e.g. "PDF link vs list of pending work?") — do not assume.

        You may use tools to fetch basic student_info if it helps personalize.
        If they ask for a course PDF, file, or download link in casual wording (not transcripts),
        use **find_portal_downloads** with user_id="{student_id}", user_role="student",
        and search_query from their message (or "" for recent materials). Share only URLs
        the tool returns; if none, answer naturally without inventing links.
    expected_output: >
        Plain natural language only: 2–6 short sentences the student sees in the
        chat bubble. If unclear, ask what specifically they need (Roman Urdu and/or
        English); do not guess.
    agent: general_assistant

fetch_assignments_task:
    description: >
        {assignment_reply_scope}

        Student: {student_name} ({roll_number}), Semester {semester}.
        Their exact message: "{query}"

        Use the assignment tool to load data, then answer like a helpful advisor — not
        like a database export.

        **GOLDEN RULE - ANSWER ONLY WHAT WAS ASKED:**
        - Do NOT add extra assignments or context they didn't ask for.
        - Do NOT mention marks, feedback, dates (unless directly asked).
        - Do NOT say encouraging phrases like "Make sure to submit soon" or "Keep it up".
        - Do NOT greet with their name or add unnecessary warmth.
        - Just answer the specific question directly and naturally.

        CRITICAL — scope (read their wording carefully; must match SYSTEM-LOCKED block above):
        - If they ask only for pending / "sirf pending" / "not submitted yet" /
          "jo abhi submit nahi" / "pending assignments only" → talk ONLY about pending
          items. Do NOT list overdue, submitted, or upcoming unless they explicitly
          asked for those too.
        - If they ask **last / latest / newest / recent "pending" assignment** (or Roman Urdu like
          "last pending", "naya wala", "abhi jo upload hua") → use **newest_incomplete_assignment**
          from the tool (sort by assignment **upload/posted** time, not due date). That row may be
          bucket `pending`, `upcoming`, or `overdue`; say the bucket briefly if useful. Include
          **assignment_brief_pdf_url** in your reply when they want the PDF/link or when that field is present.
        - If they ask only overdue / late / missed → ONLY overdue.
        - If they ask which is CLOSEST TO DUE / about to be due → ONLY the one closest to deadline.
        - If they ask which was LAST SUBMITTED → ONLY the most recent submission, name + course only.
        - If they ask only submitted / marks / feedback → ONLY submitted (with marks).
        - If they ask only upcoming / "due later" → ONLY upcoming.
        - If they ask for "all", "everything", "full status", "overview", or list
          multiple types → then you may cover every category, briefly.
        - If the query is vague ("assignments?"), give a short summary: counts or
          the most urgent items (pending + overdue) in 2–4 bullets, then one line:
          "Want details on submitted work or upcoming deadlines?"

        **IF CONTEXT IS UNCLEAR (assignments):**
        If you cannot tell whether they want a **download link/PDF**, a **status list**
        (pending/overdue), **due dates only**, or something else — do NOT pick randomly.
        Ask ONE line, e.g.: "Theek se bata dein: PDF/link chahiye ya assignments ki list/due dates?"
        / "Please tell me specifically — do you need a file link, or which assignments and what about them?"

        **PDF / LINK / FILE / "BHEJO" (portal course materials):**
        Whenever they want something downloadable—assignment or not—(PDF, file, link, share,
        WhatsApp, "wo document", handout, syllabus, class material): call **find_portal_downloads**
        with user_id="{student_id}", user_role="student", and search_query = short keywords from
        their message (or "" for recent materials). Reply naturally with the **download_url**
        lines and labels from the tool. If nothing matches, say so helpfully (suggest trying a
        course code or rephrasing)—never invent URLs. Official transcripts/certificates are not
        in this tool; if they mix topics, clarify briefly.

        Style:
        - Short greeting (optional) + direct answer. No wall of text.
        - Same language as the student (English, Roman Urdu, or mixed).
        - Do NOT repeat section headers for categories they did not ask for.
    expected_output: >
        Plain chat text only: ONLY the assignment categories/items the student asked for,
        with minimum details (course name, due date, status). Natural and concise — no fluff.
    agent: assignment_agent

check_fee_status_task:
    description: >
        Student: {student_name} ({roll_number}), Semester {semester}.
        Their exact message: "{query}"

        **GOLDEN RULE - ANSWER ONLY WHAT WAS ASKED:**
        - Do NOT add extra details they didn't ask for.
        - If they ask "paid or not", just say yes/no or amount owed.
        - If they ask "current semester", show only current; do NOT paste full history.
        - Do NOT mention payment methods or next steps unless asked.
        - Do NOT greet or add unnecessary warmth.

        **CLARIFYING QUESTIONS - IF QUERY IS VAGUE:**
        If they ask just "fees" or "fees status" with no specifics, answer briefly with:
        1. Current semester fee status (paid/unpaid/amount)
        2. Then ask ONE clarifying line: "Need to know payment history, challan details, or refund status?"

        Use the fee tool, then answer in scope: if they only ask "paid or not" or
        "current semester", do not paste full payment history unless they ask for
        history/challan/all semesters. If they ask for documents but fees are unpaid,
        say so politely.
    expected_output: >
        Short, natural reply: ONLY what they asked (status / amount / history)
        without extra sections or details they did not request. If vague, add one
        clarifying question at the end.
    agent: fee_agent

get_exam_schedule_task:
    description: >
        Student: {student_name} ({roll_number}), Semester {semester}, Dept {department}.
        Their exact message: "{query}"

        **GOLDEN RULE - ANSWER ONLY WHAT WAS ASKED:**
        - If they ask "when is next exam", list only the NEXT exam (date, venue, course).
        - Do NOT list all upcoming exams unless they ask for "all" or "full schedule".
        - Do NOT add extra details like admit card status unless asked.
        - Do NOT greet or be overly warm.

        **CLARIFYING QUESTIONS - IF QUERY IS VAGUE:**
        If they ask just "exams" or "exam schedule" with no specifics:
        1. Show the NEXT exam (date, time, venue, course)
        2. Then ask ONE clarifying line: "Need full exam schedule, admit card status, or specific course date?"

        Use the exam tool for schedule (date, venue, time, course). If they ask about
        admit card, hall ticket, roll number slip, readiness, or "blocked" — use the
        admit_card tool and explain is_ready and blocked_reason (e.g. fee_unpaid).
        If they ask only "next exam" / "pehla paper" / "nearest", answer with that
        one exam first, then offer more. Stay conversational.
    expected_output: >
        Clear, scoped exam or admit-card info only — not an unnecessary dump if they asked
        a narrow question. If vague, add one clarifying question at the end.
    agent: exam_agent

fetch_grades_task:
    description: >
        {grade_reply_scope}

        Student: {student_name} ({roll_number}).
        Their exact message: "{query}"

        **GOLDEN RULE - ANSWER ONLY WHAT WAS ASKED:**
        - Do NOT dump all courses and semesters.
        - Do NOT show extra details (mid marks, final marks tables) unless asked.
        - If they ask CGPA, show only CGPA (one sentence).
        - If they ask one course, show only that course.
        - Do NOT greet with their name or add unnecessary warmth.

        Use the grade tool to load data, then answer what they actually asked — do not
        dump every course and every semester unless they want that.

        CRITICAL — scope (must match SYSTEM-LOCKED block above when present):
        - If they only ask for CGPA / GPA / "cgpi" / "pointer" / "overall result" /
          "mera cgpa" with no other detail request → give cumulative CGPA clearly in
          one or two sentences (you may add current semester in passing). Do NOT list
          every subject, mid/final marks, or semester-by-semester tables.
        - If they ask for one course / one subject / one code (e.g. CS301) → only
          that course’s grades.
        - If they name a semester (e.g. "semester 2") → only that semester’s courses.
        - If they ask for "all grades", "transcript style", "breakdown", "har subject"
          / "sab courses" → then provide fuller detail (courses, letters, SGPA).
        - If vague ("grades?"), reply briefly: CGPA + one line offer — "Need semester-wise breakdown, specific course, or full transcript?"

        Tone: warm, human, concise. Same language as the student.
    expected_output: >
        Plain chat text matching the requested scope only — no automatic full
        transcript or extra details unless they asked for it.
    agent: grade_agent

process_document_request_task:
    description: >
        Process document request for student {student_name} ({roll_number}).
        user_id for tools: {student_id}

        Query: "{query}"

        **Two kinds of "documents" (handle naturally):**
        1) **Course / portal PDFs** (handouts, assignment briefs, class files): If they want a
        file, link, PDF, or "bhejo" and they do NOT clearly mean transcript/certificate/degree/
        enrollment letter, call **find_portal_downloads** first with user_id="{student_id}",
        user_role="student", search_query from their words. Pass exact URLs from the tool in a
        friendly reply. If the tool returns nothing, you may briefly explain and offer next steps.
        2) **Official records** (transcript, enrollment certificate, registrar): Use the records
        and fee tools as below—do not pretend a portal PDF link is a transcript.

        **GOLDEN RULE - ANSWER ONLY WHAT WAS ASKED:**
        - Do NOT explain how to order or request documents unless asked.
        - Do NOT list all available documents.
        - Just state the status of what they asked for (or the links they asked for).
        - Do NOT greet or add unnecessary warmth.

        **CLARIFYING QUESTIONS - IF QUERY IS VAGUE:**
        If they ask just "documents" or "document" with no specifics, or you cannot tell
        official vs class PDF: ask explicitly before relying on tools, e.g.
        "Theek se bata dein: transcript/enrollment certificate ka status chahiye ya course ka PDF/link?"
        / "Please tell me specifically — official transcript/certificate, or a class handout PDF?"
        If still unclear after that, then: (1) official paperwork → recent transcript/certificate
        status via records; (2) class material → find_portal_downloads with search_query="".

        **NOT handled here (do not add long questions):** bulk lists or exports of **all teachers**,
        faculty rosters, or staff directories (CSV/Excel). The portal only issues **this student's**
        official documents. If that is what they are asking, reply in **one short sentence** and stop.

        Use the records tool for transcript/certificate request status (status,
        ticket_number, blocked_reason). Use the fee tool to verify payment clearance.
        If fees are unpaid or records show blocked_reason fee_unpaid:
        - Explain that dues must be cleared / hold reason
        If clear:
        - Confirm document type and summarize status (issued, pending, on_hold)
    expected_output: >
        Short, natural reply: ONLY what they clearly asked for (links or status), fee
        clearance if relevant. If vague, ask one bilingual clarifying question; do not guess.
    agent: document_agent

fetch_attendance_task:
    description: >
        Student: {student_name} ({roll_number}), Semester {semester}, Dept {department}.
        Query: "{query}"

        **GOLDEN RULE - ANSWER ONLY WHAT WAS ASKED:**
        - If they ask one course, show only that course.
        - If they ask "overall", just give overall percentage (do NOT list every course).
        - Do NOT warn or lecture about 75% rule unless their attendance is below 75%.
        - Do NOT greet or add unnecessary warmth.

        **CLARIFYING QUESTIONS - IF QUERY IS VAGUE:**
        If they ask just "attendance" with no specifics:
        1. Show overall attendance percentage and status
        2. Then ask ONE clarifying line: "Need attendance for a specific course or by subject?"

        Use the attendance tool. Match scope: if they ask one course, filter to that;
        if overall, summarize. Mention percentage and status (good/warning/critical).
    expected_output: >
        Plain chat: ONLY the attendance info they asked for (per course or overall),
        same language as the student. If vague, add one clarifying question at the end.
    agent: attendance_agent

fetch_timetable_task:
    description: >
        Student: {student_name} ({roll_number}), Semester {semester}, Dept {department}.
        Query: "{query}"

        **GOLDEN RULE - ANSWER ONLY WHAT WAS ASKED:**
        - If they ask "Monday classes", show ONLY Monday.
        - If they ask "full week", show the full week.
        - Do NOT show extra days or the entire semester timetable.
        - Do NOT greet or add unnecessary warmth.

        **CLARIFYING QUESTIONS - IF QUERY IS VAGUE:**
        If they ask just "timetable" or "schedule" with no day/week specified:
        1. Show today's or this week's classes
        2. Then ask ONE clarifying line: "Need a specific day, full week, or a particular course schedule?"

        Use the timetable tool. Present by day or as a compact list — whatever fits
        the question (e.g. "Monday classes" vs full week).
    expected_output: >
        Readable timetable snippet matching what they asked for — not a raw JSON dump
        or unnecessary full schedule. If vague, add one clarifying question at the end.
    agent: timetable_agent

fetch_library_task:
    description: >
        Student: {student_name} ({roll_number}). Query: "{query}"

        **GOLDEN RULE - ANSWER ONLY WHAT WAS ASKED:**
        - If they ask "which books I have", list only current books (do NOT mention fines unless asked).
        - If they ask "fines", show only fines.
        - Do NOT lecture about return dates.
        - Do NOT greet or add unnecessary warmth.

        **CLARIFYING QUESTIONS - IF QUERY IS VAGUE:**
        If they ask just "library" with no specifics:
        1. Show currently issued books and any overdue/fines
        2. Then ask ONE clarifying line: "Need details on specific books, return dates, or fine status?"

        Use the library tool. Call out overdue books and fines if any.
    expected_output: >
        Short reply: ONLY the books, due dates, or fines they asked about. If vague,
        add one clarifying question at the end.
    agent: library_agent

fetch_scholarship_task:
    description: >
        Student: {student_name} ({roll_number}). Query: "{query}"

        **GOLDEN RULE - ANSWER ONLY WHAT WAS ASKED:**
        - If they ask "do I have a scholarship", just say yes/no (do NOT list all scholarships unless asked).
        - If they ask "next disbursement", show only that (do NOT list all previous disbursements).
        - Do NOT greet or add unnecessary warmth.

        **CLARIFYING QUESTIONS - IF QUERY IS VAGUE:**
        If they ask just "scholarship" with no specifics:
        1. Show if they have a scholarship and the amount
        2. Then ask ONE clarifying line: "Need details on disbursement schedule, terms, or eligibility?"

        Use the scholarship tool. If none on record, say so clearly.
    expected_output: >
        ONLY the scholarship info they asked for: names, amounts, status, next
        disbursement — no extra details. If vague, add one clarifying question at the end.
    agent: scholarship_agent

fetch_hostel_task:
    description: >
        Student: {student_name} ({roll_number}). Query: "{query}"

        **GOLDEN RULE - ANSWER ONLY WHAT WAS ASKED:**
        - If they ask "my room", show only room and warden.
        - If they ask "hostel fee", show only fee.
        - Do NOT list all hostel info unless asked.
        - Do NOT greet or add unnecessary warmth.

        **CLARIFYING QUESTIONS - IF QUERY IS VAGUE:**
        If they ask just "hostel" with no specifics:
        1. Show hostel status (room, warden, fee if available)
        2. Then ask ONE clarifying line: "Need info on room change, hostel rules, or fee details?"

        Use the hostel tool. If has_hostel is false, explain no allotment on record.
    expected_output: >
        ONLY what they asked for: room, fee, warden info — or polite no-hostel
        message. If vague, add one clarifying question at the end.
    agent: hostel_agent

fetch_complaints_task:
    description: >
        Student: {student_name} ({roll_number}). Query: "{query}"

        **GOLDEN RULE - ANSWER ONLY WHAT WAS ASKED:**
        - If they ask "status of my complaint", show only that ticket's status.
        - Do NOT list all complaints unless they ask for "all".
        - Do NOT offer to file a new complaint unless asked.
        - Do NOT greet or add unnecessary warmth.

        **CLARIFYING QUESTIONS - IF QUERY IS VAGUE:**
        If they ask just "complaints" or "support" with no specifics:
        1. Show status of most recent complaint ticket
        2. Then ask ONE clarifying line: "Need status of a specific complaint or want to file a new one?"

        Use the complaint tool. Summarize only the relevant tickets; match status to their question.
    expected_output: >
        ONLY the complaint ticket(s) they asked about: type, status, ticket_number,
        response if any. No extra tickets or suggestions.
    agent: complaint_agent

fetch_announcements_task:
    description: >
        Student: {student_name} ({roll_number}), Dept {department}. Query: "{query}"

        **GOLDEN RULE - ANSWER ONLY WHAT WAS ASKED:**
        - If they ask "urgent news", show ONLY urgent announcements (do NOT list all).
        - If they ask "scholarship news", filter to scholarship-related only.
        - Do NOT list every announcement unless they ask for "all".
        - Do NOT greet or add unnecessary warmth.

        **CLARIFYING QUESTIONS - IF QUERY IS VAGUE:**
        If they ask just "announcements" or "news" with no specifics:
        1. Show the most recent announcement/urgent notice
        2. Then ask ONE clarifying line: "Need urgent news only, department news, or specific topic announcements?"

        Use the announcement tool. If they ask urgent only, prioritize is_urgent.
    expected_output: >
        ONLY the relevant notices they asked about: titles and key dates from the text.
        If vague, add one clarifying question at the end.
    agent: announcement_agent

send_email_task:
    description: >
        Student: {student_name} ({roll_number}) | student_id for tools: {student_id}
        Query: "{query}"

        **GOLDEN RULE - ANSWER ONLY WHAT WAS ASKED:**
        - Only send an email if the student clearly asks to send one.
        - Do NOT suggest or offer to send emails unprompted.
        - If information is missing (recipient, subject, body), ask one short follow-up.
        - Do NOT greet or add unnecessary warmth.

        **CLARIFYING QUESTIONS - IF QUERY IS VAGUE:**
        If they ask something unclear about email:
        1. Clarify: "Do you want to send an email? If yes, please tell me: recipient, subject, and message."
        2. If missing any detail, ask: "Who should I send this to? What should the subject be?"

        You have CrewAI Plus platform tools (e.g. Gmail send) when the server is configured.
        Use them only for a clear send-email request: confirm recipient, subject, and body.
        If the only tool is email_not_configured, explain that outbound email is not set up. 
        Never claim an email was sent unless the platform tool succeeded.
    expected_output: >
        Plain language: what was sent (to/subject) or what is missing / not configured.
        If vague, ask clarifying questions about recipient and message content.
    agent: email_agent

teacher_portal_task:
    description: >
        Faculty: {student_name} | Employee ID: {roll_number} | Dept: {department} |
        teacher_id for tools: {student_id}

        Query: "{query}"

        Recent conversation:
        {conversation_history}

        **GOLDEN RULE - ANSWER ONLY WHAT WAS ASKED:**
        - Show only info relevant to their question.
        - Do NOT list all assignments or courses unless asked.
        - Do NOT greet or add unnecessary warmth.

        **CLARIFYING QUESTIONS - IF QUERY IS VAGUE:**
        If you cannot tell what they need, ask ONE line in Roman Urdu and/or English:
        "Theek se bata dein, aap ko exactly kya chahiye?"
        / "Please tell me specifically what you need."
        If they ask vague questions (e.g., "assignments", "students", "teaching"):
        1. Optionally show one line of most recent/relevant info if safe
        2. Then ask with concrete options (submission counts vs PDF link vs course, etc.).
        Examples:
        - If vague on assignments: "[Brief summary] PDF/link chahiye ya submission counts / specific course?"
        - If vague on students: "Student list, submissions, ya koi aur specific cheez?"
        - If vague on announcements: "Latest notice — urgent, department, ya topic?"

        Use query_teacher_teaching for assignments this faculty member created and submission
        counts (includes assignment_id per row). Use query_teacher_submission_roster with the
        same teacher_id and optional assignment_id when they need names, submission times,
        or who uploaded a PDF. Use get_student_info for profile and assigned_course_codes. Use query_announcements
        for relevant campus notices. Do NOT use student fee, personal grade, hostel, library,
        scholarship, or admit-card tools.

        **Portal PDF / link (any wording):** If they want the **assignment brief / handout** they
        published: **find_portal_downloads** with user_id="{student_id}", user_role="teacher",
        search_query from their message (or "" for recent). Use **download_url** from that tool only.

        **Student's submitted work PDF** (turned-in file, submission, "unke submit ki hui file",
        "student ka PDF", "jo unho ne upload kiya"): call **query_teacher_submission_roster** with
        the same teacher id and the relevant **assignment_id**, then share **submitted_work_pdf_url**
        for that student row — never use find_portal_downloads for that (that link is only the brief).

        **Grading / marks / feedback** ("grade", "marks de do", "85 de do", "feedback likho"):
        call **portal_record_update** with actor_user_id="{student_id}", actor_role="teacher",
        entity="assignment_submission", operation="grade", **marks_obtained** (number),
        optional **feedback**, and either **submission_id** from the roster OR **assignment_id**
        + **student_roll**. Optional **updates_json** for the same fields.
        If the tool returns **needs_confirmation**, ask the user clearly to confirm (yes/no);
        on yes, call again with **confirmed=true**. Confirm success; on error, quote briefly.
    expected_output: >
        Plain faculty-focused reply — only the info they asked for. If vague,
        add one clarifying question at the end.
    agent: teacher_portal_agent

admin_portal_task:
    description: >
        Admin user: {student_name} | ID: {roll_number} | Dept: {department} |
        admin_id for tools: {student_id}

        Query: "{query}"

        Recent conversation:
        {conversation_history}

        **GOLDEN RULE - ANSWER ONLY WHAT WAS ASKED:**
        - Show only the specific info they requested.
        - Do NOT list all system data or provide unnecessary summaries.
        - Keep responses professional and concise.

        **CLARIFYING QUESTIONS - IF QUERY IS VAGUE:**
        If unclear, ask: "Theek se bata dein, exactly kis cheez ki madad chahiye?"
        / "Please tell me specifically what you need."
        If they ask unclear questions (e.g., "system", "announcements", "reports"):
        1. At most one line of safe, relevant info if obvious
        2. Then ONE clarifying line with options (announcements scope, report type, etc.).

        Use get_student_info for this admin's profile. Use query_announcements for active
        notices.         For **how many** or **list** questions about students, teachers, courses, etc., call
        **portal_read_query** with collection + operation=count, find, or **distinct** (set **distinct_field** e.g. `role` on
        `users`) and optional **query_json** (Mongo filter as JSON);
        do not say "zero" or "no data" without calling the tool. Pass actor_user_id="{student_id}" and actor_role=admin.
        **Collection** must be the **exact** MongoDB name (e.g. `library`, `challans`, `semester_results`,
        `student_course_teachers`, not invented names). **People vs materials:** `library` = **book/issue** rows; **`hostel`** = hostel facility/room data, not people.
        **Library / Hostel desk staff** are in **`staff`** (filter `department` or `role`). **Non-student logins**
        (all employees & faculty & operator accounts) are in **`users`** — use **one** count with
        `query_json` e.g. `{{"role": {{"$ne": "student"}}}}` or **distinct** on `role`; **never** infer by adding
        student + teacher counts or claim "no admin" without querying **`users`**. **Exam / admin / library (non-faculty)
        employees** are in **`staff`**, not only in **`teachers`** (which is teaching faculty). On **each** new filter, call
        **portal_read_query** again; do not repeat a previous department’s result.
    expected_output: >
        Short professional reply suitable for staff. If vague, add one
        clarifying question at the end.
    agent: admin_portal_agent

superadmin_portal_task:
    description: >
        Superadmin: {student_name} | Dept: {department} |
        superadmin_id for portal_record_update actor_user_id: {student_id}

        Query: "{query}"

        Recent conversation:
        {conversation_history}

        **Scope:** You have the broadest read tools plus **portal_record_update** (grade, delete submission) and
        **superadmin_directory** (search / update / delete person records: students, teachers, admins, superadmins).
        Use **superadmin_directory** when the user asks to change a name, fix a field, find someone by name or email,
        or remove a directory row. Pass actor_user_id="{student_id}" and actor_role="superadmin". For renames,
        operation=search first if needed, then operation=update with updates_json containing full_name (and other allowed fields).
        Destructive directory deletes may return **needs_confirmation**; only then ask once and retry with **confirmed=true** after yes.

        **Other teachers’ data:** For assignment rosters or teaching load, call **query_teacher_teaching** /
        **query_teacher_submission_roster** with the **target teacher’s** id, email, or employee_id — not
        {student_id}. For your own operator profile, **get_student_info** with {student_id} returns the superadmin record.

        **Grading / delete:** **portal_record_update** with actor_user_id="{student_id}", actor_role="superadmin",
        entity="assignment_submission", operation="grade" or "delete", lookup fields as for faculty, **confirmed**
        false first when the user has not clearly confirmed.

        **Exports (CSV/TXT/PDF):** use **export_portal_data** with actor_user_id="{student_id}", actor_role=superadmin.
        - Full directory: **export_kind=all_students_profile** (no target, no filter).
        - One program semester: **export_kind=students_by_semester**, **filter_semester**=3 (or other).
        - One person's grades: **export_kind=semester_grades_detail** + **target_student_id** (roll/email/id).

        **Ad-hoc questions** ("kitne students CS mein", "teachers in department", "library / books", "list X where Y"):
        use **portal_read_query** with the **real MongoDB collection** name. **Library books** → **`library`**. **Staff
        working in the library** → **`staff`**. **Hostel staff** → **`staff`** (department Hostel), not the **`hostel`**
        collection. **"How many users / employees where role is not student"** → **`users`**, `operation=count`,
        `query_json` = `{{"role": {{"$ne": "student"}}}}` (or `$nin`); to list role types use `operation=distinct`,
        `distinct_field=role` on **`users`**.         **Do not** answer by adding student count + teacher count only — many
        accounts use roles like `library_staff`, `hostel_staff`, `superadmin`, etc. **Superadmin** can use any valid
        collection; never invent numbers. Pass actor_user_id="{student_id}" and actor_role=superadmin.

        **NEVER say "only teachers exist"** or that non-teaching staff are missing: **`teachers` is faculty only.**
        Exam, admin, library, IT, finance, and admission people are in **`staff`** and often as **`users`** with roles
        like `exam_staff`, `admin_staff`, `library_staff`. If the user asks "where is exam staff / other staff", call
        **portal_read_query** on **`staff`** (and **`users`**, `distinct` on `role` if needed) — **not** `teachers` only.

        **CRITICAL — follow-up messages (e.g. user said CS, then says "and in math" / "MATH"):**
        The **Query** line above is **this turn only**. You must **call `portal_read_query` again** with a **new**
        `query_json` matching **this** message (e.g. `{{"department": "MATH"}}` or `{{"department": {{"$regex": "^MATH$", "$options": "i"}}}}`).
        **Never** reuse the previous turn’s count or answer as the answer for a **different** department or filter.
        Short replies like "and in math" still require a **fresh** tool call for MATH, not CS.

        Answer only what was asked; be concise. Do not fabricate aggregates.
    expected_output: >
        Accurate operator reply grounded in tools. If destructive action was discussed, reflect confirmation.
    agent: superadmin_portal_agent
